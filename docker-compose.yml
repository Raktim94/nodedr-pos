services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nodedr-pos-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:../data/pos.db"
      PORT: "4000"
      FRONTEND_ORIGIN: "http://localhost:3000"
      COOKIE_SECURE: "false"
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    # Raw USB access for the ESC/POS thermal printer requires the container
    # to see the host's USB bus. `privileged: true` plus the device mapping
    # below is the simplest way to get that; if your printer enumerates at a
    # different path, update the mapping (see README > Hardware setup).
    privileged: true
    devices:
      - "/dev/usb/lp0:/dev/usb/lp0"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    container_name: nodedr-pos-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
